version: '3.8'

services:
  api:
    build: ./backend
    container_name: rag_backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./backend:/app

  web:
    build: ./frontend
    container_name: rag_frontend
    ports:
      - "80:80"
    depends_on:
      - api